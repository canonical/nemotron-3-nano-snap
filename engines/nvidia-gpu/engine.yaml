name: nvidia-gpu
summary: CUDA-optimized for NVIDIA GPUs
description: |
  This engine uses llama.cpp with the CUDA backend.

  It is optimized for NVIDIA GPUs.

  This engine supports both amd64 and arm64 CPU architectures.
vendor: Canonical Ltd
devices:
  allof:
    - type: gpu
      vendor-id: 0x10de # Nvidia Corporation
  anyof:
    - type: cpu
      architecture: amd64
    - type: cpu
      architecture: arm64

runtime: llamacpp-cuda

model:
  default: nemotron-3-nano-30b-a3b
  options:
    - nemotron-3-nano-30b-a3b

configurations:
  sleep-idle-seconds: 600
